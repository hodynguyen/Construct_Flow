version: "3.9"

services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: constructflow
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d constructflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672" # management UI: guest/guest
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      # FIX: mc is not bundled in minio server image — use curl instead
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Observability (optional — comment out if not needed) ──────────────────

  # FIX: single elasticsearch definition using official registry (8.13 throughout)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.13.0
    ports:
      - "8200:8200"
    command: >
      apm-server -e
        -E apm-server.rum.enabled=true
        -E setup.kibana.host=kibana:5601
        -E setup.template.settings.index.number_of_replicas=0
        -E apm-server.kibana.enabled=true
        -E apm-server.kibana.host=kibana:5601
        -E output.elasticsearch.hosts=["elasticsearch:9200"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ── Application Services ──────────────────────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    ports:
      - "50053:50053"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=constructflow
      - DB_USER=admin
      - DB_PASSWORD=secret
      - GRPC_PORT=50053
      - JWT_PRIVATE_KEY_PATH=/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/keys/public.pem
      - ELASTIC_APM_SERVER_URL=http://apm-server:8200
      - ELASTIC_APM_SERVICE_NAME=user-service
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./keys:/keys:ro
    restart: unless-stopped

  task-service:
    build:
      context: .
      dockerfile: apps/task-service/Dockerfile
    ports:
      - "50051:50051"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=constructflow
      - DB_USER=admin
      - DB_PASSWORD=secret
      - REDIS_ADDR=redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - GRPC_PORT=50051
      - ELASTIC_APM_SERVER_URL=http://apm-server:8200
      - ELASTIC_APM_SERVICE_NAME=task-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    ports:
      - "50052:50052"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=constructflow
      - DB_USER=admin
      - DB_PASSWORD=secret
      - REDIS_ADDR=redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - GRPC_PORT=50052
      - ELASTIC_APM_SERVER_URL=http://apm-server:8200
      - ELASTIC_APM_SERVICE_NAME=notification-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: apps/gw-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - TASK_SERVICE_ADDR=task-service:50051
      - USER_SERVICE_ADDR=user-service:50053
      - NOTIFICATION_SERVICE_ADDR=notification-service:50052
      - FILE_SERVICE_ADDR=file-service:50054
      - REPORT_SERVICE_ADDR=report-service:50055
      - JWT_PUBLIC_KEY_PATH=/keys/public.pem
      - CASBIN_MODEL_PATH=/casbin/model.conf
      - CASBIN_POLICY_PATH=/casbin/policy.csv
      - ELASTIC_APM_SERVER_URL=http://apm-server:8200
      - ELASTIC_APM_SERVICE_NAME=gw-gateway
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
      task-service:
        condition: service_started
      notification-service:
        condition: service_started
    volumes:
      - ./keys:/keys:ro
      # FIX: mount casbin config so gateway can load RBAC model + policy
      - ./casbin:/casbin:ro
    restart: unless-stopped

  file-service:
    build:
      context: .
      dockerfile: apps/file-service/Dockerfile
    ports:
      - "50054:50054"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=constructflow
      - DB_USER=admin
      - DB_PASSWORD=secret
      - GRPC_PORT=50054
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=constructflow
      - S3_USE_SSL=false
      - ELASTIC_APM_SERVER_URL=http://apm-server:8200
      - ELASTIC_APM_SERVICE_NAME=file-service
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  report-service:
    build:
      context: .
      dockerfile: apps/report-service/Dockerfile
    ports:
      - "50055:50055"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=constructflow
      - DB_USER=admin
      - DB_PASSWORD=secret
      - GRPC_PORT=50055
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=constructflow
      - S3_USE_SSL=false
      - ELASTIC_APM_SERVER_URL=http://apm-server:8200
      - ELASTIC_APM_SERVICE_NAME=report-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  audit-service:
    build:
      context: .
      dockerfile: apps/audit-service/Dockerfile
    ports:
      - "50056:50056"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=constructflow
      - DB_USER=admin
      - DB_PASSWORD=secret
      - GRPC_PORT=50056
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - ELASTIC_APM_SERVER_URL=http://apm-server:8200
      - ELASTIC_APM_SERVICE_NAME=audit-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  search-service:
    build:
      context: .
      dockerfile: apps/search-service/Dockerfile
    ports:
      - "50057:50057"
    environment:
      - GRPC_PORT=50057
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTIC_APM_SERVER_URL=http://apm-server:8200
      - ELASTIC_APM_SERVICE_NAME=search-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  scheduler-service:
    build:
      context: .
      dockerfile: apps/scheduler-service/Dockerfile
    ports:
      - "50058:50058"
    environment:
      - GRPC_PORT=50058
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - REDIS_ADDR=redis:6379
      - ELASTIC_APM_SERVER_URL=http://apm-server:8200
      - ELASTIC_APM_SERVICE_NAME=scheduler-service
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  es_data:
  minio_data:
