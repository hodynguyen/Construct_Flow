name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: golangci-lint (task-service)
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: apps/task-service
          version: latest

      - name: golangci-lint (user-service)
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: apps/user-service
          version: latest

      - name: golangci-lint (notification-service)
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: apps/notification-service
          version: latest

      - name: golangci-lint (gw-gateway)
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: apps/gw-gateway
          version: latest

      - name: Test (task-service)
        working-directory: apps/task-service
        run: go test ./... -race -timeout 60s

      - name: Test (user-service)
        working-directory: apps/user-service
        run: go test ./... -race -timeout 60s

      - name: Test (notification-service)
        working-directory: apps/notification-service
        run: go test ./... -race -timeout 60s

      - name: Test (gw-gateway)
        working-directory: apps/gw-gateway
        run: go test ./... -race -timeout 60s
