apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: constructflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: constructflow/gw-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: TASK_SERVICE_ADDR
              value: "task-service:50051"
            - name: USER_SERVICE_ADDR
              value: "user-service:50053"
            - name: NOTIFICATION_SERVICE_ADDR
              value: "notification-service:50052"
            - name: JWT_PUBLIC_KEY_PATH
              value: "/keys/public.pem"
            - name: CASBIN_MODEL_PATH
              value: "/casbin/model.conf"
            - name: CASBIN_POLICY_PATH
              value: "/casbin/policy.csv"
            - name: ELASTIC_APM_SERVER_URL
              value: "http://apm-server:8200"
            - name: ELASTIC_APM_SERVICE_NAME
              value: "gw-gateway"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
