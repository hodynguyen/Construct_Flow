apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: constructflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: constructflow/notification-service:latest
          ports:
            - containerPort: 50052
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "constructflow"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: url
            - name: GRPC_PORT
              value: "50052"
            - name: ELASTIC_APM_SERVER_URL
              value: "http://apm-server:8200"
            - name: ELASTIC_APM_SERVICE_NAME
              value: "notification-service"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
